name: Monthly runner T2 (Shards 5–9)

on:
  workflow_dispatch:   # manual run allowed
  schedule:
    # Runs 1st of every month at 5:00 PM IST
    - cron: '30 11 1 * *'


jobs:
  scrape:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [5,6,7,8,9]

    env:
      SHARD_STEP: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install selenium beautifulsoup4 gspread webdriver-manager

      - run: echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
      - run: echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json

      - run: |
          FILE="checkpoint_group2_${{ matrix.shard }}.txt"
          [ ! -f "$FILE" ] && echo "1" > "$FILE"

      - env:
          SHARD_INDEX: ${{ matrix.shard }}
          CHECKPOINT_FILE: checkpoint_group2_${{ matrix.shard }}.txt
        run: python monthly_runner.py
